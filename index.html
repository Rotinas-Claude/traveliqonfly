<!DOCTYPE html>
<html lang="pt-BR" id="html-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TravelIQ — Corporate Travel Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0b0e17;--bg2:#111521;--bg3:#181e2e;--card:#141929;
  --b:rgba(255,255,255,.06);--b2:rgba(255,255,255,.12);
  --txt:#e2e6f3;--muted:#6b7494;
  --blue:#4f8ef7;--violet:#7c6cf8;--teal:#2dd4bf;
  --green:#34d399;--warn:#fbbf24;--red:#f87171;--pink:#f472b6;
  --f:'DM Sans',sans-serif;--m:'DM Mono',monospace;
  --r:10px;--rl:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:var(--f);font-size:14px;overflow:hidden}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}
.hidden{display:none!important}
.flex{display:flex}.ac{align-items:center}.sb{justify-content:space-between}.grow{flex:1}
.bold{font-weight:600}.mono{font-family:var(--m)}.muted{color:var(--muted)}
.bl{color:var(--blue)}.gr{color:var(--green)}.wa{color:var(--warn)}.re{color:var(--red)}

/* ── LOGIN ── */
#login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200}
.lbox{width:100%;max-width:380px;padding:0 20px}
.llogo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.lico{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--violet));display:flex;align-items:center;justify-content:center;font-size:17px}
.lnm{font-size:20px;font-weight:700;letter-spacing:-.4px}.lnm em{font-style:normal;color:var(--blue)}
.ltit{font-size:22px;font-weight:700;margin-bottom:3px;letter-spacing:-.4px}
.lsub{color:var(--muted);font-size:13px;margin-bottom:22px}
.fg{margin-bottom:12px}.fl{display:block;font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
.fi{width:100%;padding:9px 12px;background:var(--bg3);border:1px solid var(--b2);border-radius:var(--r);color:var(--txt);font-family:var(--f);font-size:14px;outline:none;transition:border-color .15s}
.fi:focus{border-color:var(--blue)}.fi::placeholder{color:var(--muted)}
select.fi{cursor:pointer;appearance:none}
.lbtn{width:100%;padding:10px;background:linear-gradient(135deg,var(--blue),var(--violet));border:none;border-radius:var(--r);color:#fff;font-family:var(--f);font-size:15px;font-weight:600;cursor:pointer}
.lbtn:hover{opacity:.88}
.lerr{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--red);border-radius:8px;padding:8px 12px;font-size:12px;margin-top:8px}
.lforgot{margin-top:12px;text-align:center;font-size:12px;color:var(--muted)}
.lforgot a{color:var(--blue);text-decoration:none;cursor:pointer}.lforgot a:hover{text-decoration:underline}
.llock{margin-top:12px;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--red);text-align:center;display:none}

/* ── LANG TOGGLE ── */
.lang-toggle{position:absolute;top:16px;right:16px;display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--b2);border-radius:20px;padding:4px}
.lang-btn{padding:3px 10px;border-radius:16px;font-size:11px;font-weight:700;cursor:pointer;background:none;border:none;color:var(--muted);font-family:var(--f);transition:all .15s}
.lang-btn.active{background:var(--blue);color:#fff}

/* ── SHELL ── */
#app{display:flex;height:100vh;overflow:hidden}
#sb{width:210px;min-width:210px;background:var(--bg2);border-right:1px solid var(--b);display:flex;flex-direction:column;padding:14px 0}
.sblogo{display:flex;align-items:center;gap:8px;padding:0 12px 14px;border-bottom:1px solid var(--b);margin-bottom:6px}
.sbico{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--blue),var(--violet));display:flex;align-items:center;justify-content:center;font-size:12px}
.sbnm{font-size:14px;font-weight:700;letter-spacing:-.3px}.sbnm em{font-style:normal;color:var(--blue)}
nav{flex:1;overflow-y:auto;padding:0 6px}
.ns{margin-bottom:2px}.nsl{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:6px 8px 2px}
.ni{display:flex;align-items:center;gap:7px;padding:6px 9px;border-radius:8px;cursor:pointer;color:var(--muted);font-size:12px;font-weight:500;transition:background .12s,color .12s;user-select:none}
.ni:hover{background:var(--bg3);color:var(--txt)}.ni.active{background:rgba(79,142,247,.13);color:var(--blue)}
.ni .ic{font-size:13px;width:16px;text-align:center;flex-shrink:0}
.nbadge{margin-left:auto;background:var(--blue);color:#fff;font-size:10px;font-weight:700;padding:1px 5px;border-radius:10px}
.nbadge.warn{background:var(--warn);color:#000}
.sfoo{padding:12px 12px 0;border-top:1px solid var(--b)}
.upill{display:flex;align-items:center;gap:7px;padding:4px 0}
.av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0;background:linear-gradient(135deg,var(--blue),var(--violet))}
.unm{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.urol{font-size:10px;color:var(--muted)}
.lou{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:3px;border-radius:4px;transition:color .15s}.lou:hover{color:var(--red)}

/* ── MAIN ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tb{display:flex;align-items:center;gap:12px;padding:12px 22px;border-bottom:1px solid var(--b);background:var(--bg2);min-height:52px;flex-shrink:0}
.tti{font-size:15px;font-weight:700;letter-spacing:-.3px}
.tsb{font-size:11px;color:var(--muted);margin-top:1px}
.tact{display:flex;align-items:center;gap:8px;margin-left:auto}
.apidot{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700}
.apidot.off{background:rgba(248,113,113,.1);color:var(--red)}
.dot{width:5px;height:5px;border-radius:50%;background:currentColor}
.cnt{flex:1;overflow-y:auto;padding:20px 22px}

/* ── BUTTONS ── */
.btn{padding:6px 12px;border-radius:8px;font-family:var(--f);font-size:12px;font-weight:600;cursor:pointer;border:none;transition:opacity .15s}
.bp{background:linear-gradient(135deg,var(--blue),var(--violet));color:#fff}.bp:hover{opacity:.88}
.bg{background:var(--bg3);color:var(--txt);border:1px solid var(--b2)}.bg:hover{background:var(--card)}
.bd{background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.2)}
.bsm{padding:4px 10px;font-size:11px}

/* ── CARDS / KPIs ── */
.card{background:var(--card);border:1px solid var(--b);border-radius:var(--rl);padding:14px 16px}
.kpi{background:var(--bg3);border:1px solid var(--b);border-radius:var(--r);padding:12px 14px}
.kl{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.3px;margin-bottom:2px;text-transform:uppercase}
.kv{font-size:22px;font-weight:700;letter-spacing:-.5px;line-height:1.1}
.kd{font-size:11px;margin-top:2px;color:var(--muted)}
.kgrid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.kgrid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.kgrid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}

/* ── TABLES ── */
.tw{overflow-x:auto;border-radius:var(--rl);border:1px solid var(--b)}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--bg3)}
th{padding:8px 11px;text-align:left;font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}
td{padding:9px 11px;font-size:12px;border-top:1px solid var(--b);white-space:nowrap}
tr:hover td{background:rgba(255,255,255,.01)}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700}
.b-blue{background:rgba(79,142,247,.15);color:#7cb3ff}
.b-green{background:rgba(52,211,153,.12);color:var(--green)}
.b-warn{background:rgba(251,191,36,.12);color:var(--warn)}
.b-red{background:rgba(248,113,113,.12);color:var(--red)}
.b-violet{background:rgba(124,108,248,.15);color:#a89cf8}
.b-teal{background:rgba(45,212,191,.12);color:var(--teal)}
.b-gray{background:rgba(107,116,148,.15);color:#9ba3c2}
.b-pink{background:rgba(244,114,182,.12);color:var(--pink)}

/* ── TABS ── */
.tabs{display:flex;gap:2px;background:var(--bg3);padding:3px;border-radius:8px;width:fit-content;margin-bottom:16px}
.tab{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .12s}.tab.active{background:var(--card);color:var(--txt)}

/* ── MISC ── */
.shd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.stitle{font-size:13px;font-weight:700}.ssub{font-size:11px;color:var(--muted);margin-top:1px}
.prog{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:4px}
.pf{height:100%;border-radius:3px}
.divider{height:1px;background:var(--b);margin:12px 0}
.insight{display:flex;gap:10px;padding:10px 12px;border-radius:10px;border:1px solid;margin-bottom:8px}
.ins-blue{background:rgba(79,142,247,.07);border-color:rgba(79,142,247,.2)}
.ins-warn{background:rgba(251,191,36,.07);border-color:rgba(251,191,36,.2)}
.ins-green{background:rgba(52,211,153,.07);border-color:rgba(52,211,153,.2)}
.ins-red{background:rgba(248,113,113,.07);border-color:rgba(248,113,113,.2)}
.iico{font-size:14px;flex-shrink:0;margin-top:1px}
.ititle{font-size:12px;font-weight:700;margin-bottom:2px}.idesc{font-size:11px;color:var(--muted);line-height:1.5}
.upz{border:2px dashed var(--b2);border-radius:var(--rl);padding:24px;text-align:center;cursor:pointer;transition:border-color .2s}
.upz:hover{border-color:var(--blue);background:rgba(79,142,247,.03)}

/* ── TOAST ── */
#toast{position:fixed;bottom:18px;right:18px;background:var(--bg2);border:1px solid var(--b2);border-radius:10px;padding:9px 14px;font-size:12px;box-shadow:0 8px 24px rgba(0,0,0,.5);transform:translateY(55px);opacity:0;transition:transform .22s,opacity .22s;z-index:999}
#toast.show{transform:translateY(0);opacity:1}
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login">
  <div class="lang-toggle">
    <button class="lang-btn active" id="lb-pt" onclick="setLang('pt')">PT</button>
    <button class="lang-btn" id="lb-en" onclick="setLang('en')">EN</button>
  </div>
  <div class="lbox">
    <div class="llogo"><div class="lico">✈️</div><div class="lnm">Travel<em>IQ</em></div></div>
    <div class="ltit" id="l-title">Acesso à Plataforma</div>
    <div class="lsub" id="l-sub">Gestão inteligente de viagens corporativas</div>
    <div class="fg"><label class="fl" id="l-em-lbl">E-mail</label><input class="fi" id="l-e" type="email" placeholder="seu@empresa.com.br" autocomplete="username"></div>
    <div class="fg"><label class="fl" id="l-pw-lbl">Senha</label><input class="fi" id="l-p" type="password" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="lbtn" onclick="doLogin()" id="l-btn">Entrar</button>
    <div id="l-err" class="lerr hidden">E-mail ou senha incorretos.</div>
    <div id="l-lock" class="llock">🔒 Conta temporariamente bloqueada. Tente novamente em <span id="l-countdown">30</span>s.</div>
    <div class="lforgot"><a onclick="toast('Entre em contato com o administrador do sistema.')">Esqueci minha senha</a></div>

  </div>
</div>

<!-- ── APP ── -->
<div id="app" class="hidden">
  <div id="sb">
    <div class="sblogo"><div class="sbico">✈️</div><div class="sbnm">Travel<em>IQ</em></div></div>
    <nav id="nav-menu"></nav>
    <div class="sfoo">
      <div class="upill">
        <div class="av" id="s-av">AD</div>
        <div style="flex:1;min-width:0"><div class="unm" id="s-nm">Admin</div><div class="urol" id="s-ro">Administrador</div></div>
        <button class="lou" onclick="doLogout()">↩</button>
      </div>

    </div>
  </div>
  <div id="main">
    <div class="tb">
      <div><div class="tti" id="t-ti">Dashboard</div><div class="tsb" id="t-sb"></div></div>
      <div class="tact">
        <div style="display:flex;align-items:center;gap:3px;background:var(--bg3);border:1px solid var(--b2);border-radius:20px;padding:3px">
          <button class="lang-btn active" id="app-lb-pt" onclick="setLang('pt')" style="padding:3px 11px;border-radius:14px;font-size:11px;font-weight:700;cursor:pointer;border:none;font-family:var(--f);background:var(--blue);color:#fff;transition:all .15s">PT</button>
          <button class="lang-btn" id="app-lb-en" onclick="setLang('en')" style="padding:3px 11px;border-radius:14px;font-size:11px;font-weight:700;cursor:pointer;border:none;font-family:var(--f);background:transparent;color:var(--muted);transition:all .15s">EN</button>
        </div>
        <div class="apidot off"><div class="dot"></div><span id="api-lbl">Onfly: Desconectado</span></div>
        <button class="btn bg bsm" onclick="nav('api')" id="btn-api-cfg">Configurar API</button>
        <button class="btn bp bsm" onclick="nav('import')" id="btn-import">+ Importar</button>
      </div>
    </div>
    <div class="cnt" id="content"></div>
  </div>
</div>
<div id="toast"></div>

function t(key) {
  return (T[key] || {})[LANG] || key;
}

function setLang(lang) {
  LANG = lang;
  document.getElementById('html-root').lang = lang === 'pt' ? 'pt-BR' : 'en';
  // Login buttons
  ['lb-pt','app-lb-pt'].forEach(id=>{const el=document.getElementById(id);if(el){el.style.background=lang==='pt'?'var(--blue)':'var(--bg3)';el.style.color=lang==='pt'?'#fff':'var(--muted)'}});
  ['lb-en','app-lb-en'].forEach(id=>{const el=document.getElementById(id);if(el){el.style.background=lang==='en'?'var(--blue)':'var(--bg3)';el.style.color=lang==='en'?'#fff':'var(--muted)'}});
  // Translate login static elements
  const map = {
    'l-title':t('login.title'),'l-sub':t('login.sub'),
    'l-em-lbl':t('login.email'),'l-pw-lbl':t('login.pass'),'l-btn':t('login.btn'),
    'l-err':t('login.err'),'api-lbl':'Onfly: '+t('disconnected'),
    'btn-api-cfg':t('configure'),'btn-import':t('import'),
  };
  Object.entries(map).forEach(([id,val])=>{const el=document.getElementById(id);if(el)el.textContent=val});
  // Rebuild nav and re-render current page if app is open
  if(!document.getElementById('app').classList.contains('hidden')) {
    buildNav();
    if(currentPage) nav(currentPage);
  }
}

function calcFlightAnalytics(){
  const routeMap={},destMap={},ciaMap={},ccMap={},mesMap={};
  SEED_FLIGHTS.forEach(f=>{
    const m=f.compra.slice(0,7);
    if(!routeMap[f.trecho])routeMap[f.trecho]={count:0,total:0,vals:[],pass:new Set()};
    routeMap[f.trecho].count++;routeMap[f.trecho].total+=f.valor;routeMap[f.trecho].vals.push(f.valor);routeMap[f.trecho].pass.add(f.passageiro);
    if(!destMap[f.destino])destMap[f.destino]={count:0,total:0,pass:new Set()};
    destMap[f.destino].count++;destMap[f.destino].total+=f.valor;destMap[f.destino].pass.add(f.passageiro);
    if(!ciaMap[f.cia])ciaMap[f.cia]={count:0,total:0,exec:0};
    ciaMap[f.cia].count++;ciaMap[f.cia].total+=f.valor;if(f.classe==='Executiva')ciaMap[f.cia].exec++;
    if(!ccMap[f.centro_custo])ccMap[f.centro_custo]={count:0,total:0};
    ccMap[f.centro_custo].count++;ccMap[f.centro_custo].total+=f.valor;
    if(!mesMap[m])mesMap[m]={count:0,total:0,exec:0,eco:0};
    mesMap[m].count++;mesMap[m].total+=f.valor;
    if(f.classe==='Executiva')mesMap[m].exec+=f.valor;else mesMap[m].eco+=f.valor;
  });
  const alerts=[];
  Object.entries(routeMap).forEach(([trecho,d])=>{
    if(d.count<2)return;
    const avg=d.total/d.count;
    d.vals.forEach((v,i)=>{
      const pct=(v-avg)/avg*100;
      if(Math.abs(pct)>60){
        const f2=SEED_FLIGHTS.filter(x=>x.trecho===trecho)[i];
        if(f2)alerts.push({...f2,avgRota:avg,pct:pct.toFixed(0)*1,trecho});
      }
    });
  });
  return {routeMap,destMap,ciaMap,ccMap,mesMap,alerts};
}

  hotelRank.filter(h=>h.rsv>=3).forEach(h=>{
    ALL_BOOKINGS.filter(b=>b.hotel===h.h).forEach(b=>{
      const pct=(b.valorDiaria-h.avgD)/h.avgD*100;
      if(pct>80)outliers.push({...b,avgHotel:h.avgD,pct});
    });
  });
  outliers.sort((a,b)=>Math.abs(b.pct)-Math.abs(a.pct));
  return {cityRank,hotelRank,outliers};
}

function txs(s,m='readonly'){return db.transaction(s,m).objectStore(s)}
function dbGA(s){return new Promise((r,j)=>{const q=txs(s).getAll();q.onsuccess=()=>r(q.result);q.onerror=()=>j()})}
function dbP(s,v){return new Promise((r,j)=>{const q=txs(s,'readwrite').put(v);q.onsuccess=()=>r(q.result);q.onerror=()=>j()})}

// ── Security: rate limiting ──
let _loginAttempts=0, _lockUntil=0, _lockTimer=null;
const MAX_ATTEMPTS=5, LOCK_SECS=30;

async function hashPass(pass){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pass));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function doLogin(){
  const now=Date.now();
  if(now<_lockUntil){return;}// still locked, ignore clicks

  const e=document.getElementById('l-e').value.trim().toLowerCase();
  const p=document.getElementById('l-p').value;
  if(!e||!p){return;}

  const btn=document.getElementById('l-btn');
  btn.disabled=true;btn.style.opacity='.6';

  const hashed=await hashPass(p);
  const users=await dbGA('app_users');
  const u=users.find(u=>u.email===e&&(u.passHash===hashed||(u.pass&&u.pass===p))&&u.active);

  btn.disabled=false;btn.style.opacity='';

  if(u){
    _loginAttempts=0;
    currentUser=u;
    document.getElementById('login').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('s-av').textContent=ini(u.name);
    document.getElementById('s-nm').textContent=u.name;
    const roleKey='role.'+u.role;
    document.getElementById('s-ro').textContent=t(roleKey)||u.role;
    buildNav();nav('dashboard');
  } else {
    _loginAttempts++;
    const errEl=document.getElementById('l-err');
    const lockEl=document.getElementById('l-lock');
    if(_loginAttempts>=MAX_ATTEMPTS){
      _lockUntil=Date.now()+LOCK_SECS*1000;
      errEl.classList.add('hidden');
      lockEl.style.display='block';
      document.getElementById('l-btn').disabled=true;
      let rem=LOCK_SECS;
      document.getElementById('l-countdown').textContent=rem;
      _lockTimer=setInterval(()=>{
        rem--;
        document.getElementById('l-countdown').textContent=rem;
        if(rem<=0){
          clearInterval(_lockTimer);
          _loginAttempts=0;
          _lockUntil=0;
          lockEl.style.display='none';
          document.getElementById('l-btn').disabled=false;
          document.getElementById('l-p').value='';
        }
      },1000);
    } else {
      errEl.classList.remove('hidden');
      const left=MAX_ATTEMPTS-_loginAttempts;
      errEl.textContent=LANG==='pt'
        ?`Credenciais inválidas. ${left} tentativa${left>1?'s':''} restante${left>1?'s':''}.`
        :`Invalid credentials. ${left} attempt${left>1?'s':''} remaining.`;
    }
  }
}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&!document.getElementById('login').classList.contains('hidden'))doLogin()});
function doLogout(){
  currentUser=null;
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login').classList.remove('hidden');
  document.getElementById('l-err').classList.add('hidden');
  document.getElementById('l-e').value='';document.getElementById('l-p').value='';
}

function switchHTab(el,tab){
  el.closest('.tabs').querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');
  ['visao','cidades','ranking','tickets','lista'].forEach(k=>{const e=document.getElementById('htab-'+k);if(e)e.classList.toggle('hidden',k!==tab)});
  if(tab==='cidades')buildHTCidades();
  if(tab==='ranking')buildHTRanking();
  if(tab==='tickets')buildHTTickets();
}

function buildHTTickets(){
  const ranges={'<R$300':0,'R$300–500':0,'R$500–800':0,'R$800–1200':0,'>R$1200':0};
  ALL_BOOKINGS.forEach(b=>{if(b.valorDiaria<300)ranges['<R$300']++;else if(b.valorDiaria<500)ranges['R$300–500']++;else if(b.valorDiaria<800)ranges['R$500–800']++;else if(b.valorDiaria<1200)ranges['R$800–1200']++;else ranges['>R$1200']++});
  const c=document.getElementById('ch-ranges')?.getContext('2d');
  if(c){if(charts.rng)charts.rng.destroy();charts.rng=new Chart(c,{type:'doughnut',data:{labels:Object.keys(ranges),datasets:[{data:Object.values(ranges),backgroundColor:['rgba(52,211,153,.75)','rgba(79,142,247,.75)','rgba(251,191,36,.75)','rgba(248,113,113,.75)','rgba(244,114,182,.75)'],borderWidth:0,hoverOffset:6}]},options:{responsive:true,maintainAspectRatio:false,cutout:'55%',plugins:{legend:{position:'right',labels:{color:'#6b7494',font:{size:9},padding:5}}}}})}

function hRow(b){return`<tr><td class="mono bl" style="font-size:11px">${b._id}</td><td class="muted">${b.compra}</td><td>${b.hospede}</td><td style="font-size:11px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${b.hotel}</td><td><span class="badge b-gray">${b.cidade}</span></td><td>${b.checkin}</td><td>${b.checkout}</td><td style="text-align:center">${b.diarias}</td><td class="bold">${R(b.valorPago)}</td><td class="muted">${R(b.valorDiaria)}</td></tr>`}

function fH(){
  const q=document.getElementById('h-q')?.value.toLowerCase()||'';
  const hotel=document.getElementById('h-hotel')?.value||'';
  const cidade=document.getElementById('h-cidade')?.value||'';
  const dias=document.getElementById('h-diarias')?.value||'';
  const r=ALL_BOOKINGS.filter(b=>{
    const mq=(b._id+b.hospede+b.hotel).toLowerCase().includes(q);
    return mq&&(!hotel||b.hotel===hotel)&&(!cidade||b.cidade===cidade)&&(!dias||(dias==='1'&&b.diarias===1)||(dias==='2-5'&&b.diarias>=2&&b.diarias<=5)||(dias==='6+'&&b.diarias>=6));
  });
  const tb=document.getElementById('h-tb');if(tb)tb.innerHTML=r.map(hRow).join('');
  window._hFiltered=r;
  const isF=q||hotel||cidade||dias;
  const kpi=document.getElementById('h-kpis');
  if(kpi){kpi.querySelectorAll('.kpi').forEach(el=>el.style.borderColor=isF?'var(--blue)':'')}
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v};
  const gasto=r.reduce((a,b)=>a+b.valorPago,0);
  const noites=r.reduce((a,b)=>a+b.diarias,0);
  const avgD=r.length?r.reduce((a,b)=>a+b.valorDiaria,0)/r.length:0;
  set('hk-rsv',r.length);
  set('hk-sub',isF?`${t('of_total')}: ${ALL_BOOKINGS.length} (${((r.length/ALL_BOOKINGS.length)*100).toFixed(0)}%)`:`${t('of_total')}: ${ALL_BOOKINGS.length}`);
  set('hk-total',R(gasto));set('hk-noites',noites+' '+t('nights'));
  set('hk-avg',r.length?R(avgD):'—');
  set('hk-minmax',r.length?`${t('min')} ${R(Math.min(...r.map(b=>b.valorDiaria)))} · ${t('max')} ${R(Math.max(...r.map(b=>b.valorDiaria)))}`:' ');
  set('hk-hosp',new Set(r.map(b=>b.hospede)).size);
  set('hk-hotels',new Set(r.map(b=>b.hotel)).size+' '+t('hotels'));
}

function resetFH(){
  ['h-q','h-hotel','h-cidade','h-diarias'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=''});fH();
}

function exportHotelCSV(){
  const data=window._hFiltered||ALL_BOOKINGS;
  const hdr=['ID',t('guest'),t('hotel'),t('city'),t('purchase_date'),t('checkin'),t('checkout'),t('nights'),t('value_paid'),t('daily_rate')];
  const rows=data.map(b=>[b._id,b.hospede,b.hotel,b.cidade,b.compra,b.checkin,b.checkout,b.diarias,b.valorPago.toFixed(2),b.valorDiaria.toFixed(2)]);
  const csv=[hdr,...rows].map(r=>r.join(';')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));

// ── BUS ROUTES & ANALYSIS ──
function pBusRoutes(){
  const c=document.getElementById('content');

  // Route analytics
  const routeMap={};
  SEED_BUS.forEach(b=>{
    if(!routeMap[b.trecho])routeMap[b.trecho]={count:0,total:0,pass:new Set()};
    routeMap[b.trecho].count++;routeMap[b.trecho].total+=b.valor;routeMap[b.trecho].pass.add(b.viajante);
  });
  const routes=Object.entries(routeMap).map(([tr,v])=>({tr,count:v.count,total:v.total,pass:v.pass.size,avg:v.total/v.count})).sort((a,b)=>b.count-a.count);

  // Company analytics
  const ciaMap={};
  SEED_BUS.forEach(b=>{if(!ciaMap[b.cia])ciaMap[b.cia]={count:0,total:0};ciaMap[b.cia].count++;ciaMap[b.cia].total+=b.valor});
  const cias=Object.entries(ciaMap).map(([n,v])=>({cia:n,count:v.count,total:v.total,avg:v.total/v.count})).sort((a,b)=>b.total-a.total);

  // Monthly
  const MES=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const mesMap={};
  SEED_BUS.forEach(b=>{const p=b.compra.split('-');if(p.length<3)return;const k=MES[+p[1]-1]+'/'+p[0].slice(2);if(!mesMap[k])mesMap[k]={count:0,total:0};mesMap[k].count++;mesMap[k].total+=b.valor});

  // Comparison vs flights for same routes
  const busAvg=TOTAL_B/SEED_BUS.length;

  c.innerHTML=`

    <div class="kpi"><div class="kl">${t('bus.routes')}</div><div class="kv">${routes.length}</div><div class="kd">${LANG==='pt'?'rotas distintas':'distinct routes'}</div></div>

  </div>

  <!-- Comparison chart -->
  <div class="kgrid2" style="margin-bottom:14px">
    <div class="card">
      <div class="stitle" style="margin-bottom:12px">🚌 ${LANG==='pt'?'Rotas de ônibus':'Bus routes'}</div>
      ${routes.map((r,i)=>`
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
        <div style="font-size:16px;font-weight:700;color:var(--teal);min-width:22px;text-align:center">${i+1}</div>
        <div style="flex:1">
          <div class="flex sb ac" style="margin-bottom:3px">
            <span class="bold" style="font-size:12px">${r.tr}</span>
            <div class="flex ac" style="gap:8px">
              <span class="badge b-gray">${r.count} ${t('records')}</span>
              <span class="bold">${R(r.total)}</span>
            </div>
          </div>
          <div class="prog"><div class="pf" style="width:${(r.count/routes[0].count*100).toFixed(0)}%;background:var(--teal)"></div></div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px">${t('average')}: ${R(r.avg)} · ${r.pass} ${t('guests').toLowerCase()}</div>
        </div>
      </div>`).join('')}
    </div>
    <div class="card">
      <div class="stitle" style="margin-bottom:10px">🏢 ${LANG==='pt'?'Empresas de ônibus':'Bus companies'}</div>

      <div style="padding:9px 0;border-top:${i?'1px solid var(--b)':'none'}">
        <div class="flex sb ac" style="margin-bottom:4px">
          <span class="bold">${a.cia}</span>
          <div class="flex ac" style="gap:7px"><span class="badge b-gray">${a.count}</span><span class="bold">${R(a.total)}</span></div>
        </div>
        <div class="prog"><div class="pf" style="width:${(a.total/cias[0].total*100).toFixed(0)}%;background:var(--teal)"></div></div>
      </div>`).join('')}

      <div class="divider"></div>
      <div class="stitle" style="margin-bottom:10px">${LANG==='pt'?'Gastos mensais':'Monthly spend'}</div>
      ${Object.entries(mesMap).sort((a,b)=>a[0].localeCompare(b[0])).map(([m,d])=>`
      <div class="flex sb ac" style="padding:4px 0;border-top:1px solid var(--b)">
        <span style="font-size:12px">${m}</span>
        <div class="flex ac" style="gap:8px"><span class="badge b-gray">${d.count}</span><span class="bold">${R(d.total)}</span></div>
      </div>`).join('')}
    </div>
  </div>

  <!-- Transport mode comparison -->
  <div class="card" style="margin-bottom:14px">
    <div class="stitle" style="margin-bottom:12px">📊 ${LANG==='pt'?'Comparativo: Ônibus vs Voo vs Hotel':'Comparison: Bus vs Flight vs Hotel'}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
      <div style="padding:14px;background:var(--bg3);border-radius:var(--r);border:1px solid var(--b);border-top:3px solid var(--teal)">
        <div style="font-size:11px;font-weight:700;color:var(--teal);margin-bottom:8px">🚌 ${LANG==='pt'?'ÔNIBUS':'BUS'}</div>
        <div style="font-size:20px;font-weight:700">${R(TOTAL_B)}</div>
        <div class="muted" style="font-size:11px;margin-top:3px">${SEED_BUS.length} ${t('records')} · ${R(busAvg)} ${LANG==='pt'?'médio':'avg'}</div>
        <div style="font-size:11px;color:var(--teal);margin-top:6px">✓ ${LANG==='pt'?'mais econômico':'most economical'}</div>
      </div>
      <div style="padding:14px;background:var(--bg3);border-radius:var(--r);border:1px solid var(--b);border-top:3px solid var(--blue)">
        <div style="font-size:11px;font-weight:700;color:var(--blue);margin-bottom:8px">✈️ ${LANG==='pt'?'VOOS':'FLIGHTS'}</div>
        <div style="font-size:20px;font-weight:700">${R(TOTAL_V)}</div>
        <div class="muted" style="font-size:11px;margin-top:3px">${SEED_FLIGHTS.length} ${t('records')} · ${R(flightAvg)} ${LANG==='pt'?'médio':'avg'}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:6px">${((TOTAL_V/(TOTAL_H+TOTAL_V+TOTAL_B))*100).toFixed(1)}% ${t('of_total')}</div>
      </div>
      <div style="padding:14px;background:var(--bg3);border-radius:var(--r);border:1px solid var(--b);border-top:3px solid var(--violet)">
        <div style="font-size:11px;font-weight:700;color:var(--violet);margin-bottom:8px">🏨 ${LANG==='pt'?'HOTEL':'HOTEL'}</div>
        <div style="font-size:20px;font-weight:700">${R(TOTAL_H)}</div>
        <div class="muted" style="font-size:11px;margin-top:3px">${ALL_BOOKINGS.length} ${t('records')} · ${R(TOTAL_H/ALL_BOOKINGS.length)} ${LANG==='pt'?'médio':'avg'}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:6px">${((TOTAL_H/(TOTAL_H+TOTAL_V+TOTAL_B))*100).toFixed(1)}% ${t('of_total')}</div>
      </div>
    </div>
    <div style="margin-top:12px;height:180px;position:relative"><canvas id="ch-transport"></canvas></div>
  </div>

  <!-- Insights -->
  <div class="card">
    <div class="stitle" style="margin-bottom:10px">${t('hotel.insights')}</div>
    <div class="insight ins-green"><div class="iico">💡</div><div>
      <div class="ititle">${t('bus.insight1')}</div>
      <div class="idesc">${t('bus.insight1d')}</div>
    </div></div>
    <div class="insight ins-blue"><div class="iico">📊</div><div>
      <div class="ititle">${t('bus.insight2')}</div>
      <div class="idesc">${t('bus.insight2d')}</div>
    </div></div>
    <div class="insight ins-warn"><div class="iico">🌱</div><div>
      <div class="ititle">${LANG==='pt'?'Impacto ambiental':'Environmental impact'}</div>
      <div class="idesc">${LANG==='pt'?'Ônibus emite em média 7x menos CO₂ por km que aviões. Priorizar ônibus em rotas < 500km reduz a pegada de carbono da empresa.':'Buses emit on average 7x less CO₂ per km than planes. Prioritizing bus on routes < 500km reduces the company carbon footprint.'}</div>
    </div></div>
  </div>`;

  // Transport comparison chart
  const ctx=document.getElementById('ch-transport')?.getContext('2d');
  if(ctx)charts.trans=new Chart(ctx,{
    type:'bar',
    data:{
      labels:[LANG==='pt'?'Ônibus':'Bus',LANG==='pt'?'Voos':'Flights',LANG==='pt'?'Hotéis':'Hotels'],
      datasets:[{
        label:t('total_spent'),
        data:[TOTAL_B,TOTAL_V,TOTAL_H],
        backgroundColor:['rgba(45,212,191,.7)','rgba(79,142,247,.7)','rgba(124,108,248,.7)'],
        borderRadius:6
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>'Total: '+R(ctx.parsed.y)}}},
      scales:{x:{grid:{display:false},ticks:{color:'#6b7494',font:{size:11}}},y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#6b7494',callback:v=>'R$'+(v/1000).toFixed(0)+'k'}}}
    }
  });
}

</script>
</body>
</html>
